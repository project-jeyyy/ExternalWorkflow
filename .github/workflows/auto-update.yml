name: Auto-Update Tracker

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  update:
    if: contains(github.event.issue.labels.*.name, 'update-request')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run update script
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/update.py

      - name: Commit and push changes
        run: |
          git config user.name "hedgi-bot"
          git config user.email "bot@hedgi.ai"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-update: ${{ github.event.issue.title }}"
          git push

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "✅ Done! The tracker has been updated and the live site will reflect the change within ~2 minutes.\n\n🔗 https://project-jeyyy.github.io/ExternalWorkflow/"
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
              state_reason: "completed"
            });
